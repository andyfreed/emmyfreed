<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Edit my website ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@400;600;700;800&display=swap">
<style>
  :root{
    --ink:#1a1a2e; --ink-soft:#3d3d5c; --paper:#FFF8E7;
    --pink:#FF3D7F; --pink-soft:#FFB5D8; --yellow:#FFD23F; --yellow-soft:#FFF1A5;
    --mint:#B4E4B4; --sky:#7DD3FC; --lav:#C084FC; --lav-soft:#E7C6FF;
    --radius:18px; --pop:5px 5px 0 var(--ink);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:'Nunito',system-ui,sans-serif; color:var(--ink);
    background:var(--paper);
    background-image:radial-gradient(var(--pink-soft) 1.5px, transparent 1.5px),
                     radial-gradient(var(--sky) 1.5px, transparent 1.5px);
    background-size:42px 42px; background-position:0 0,21px 21px;
    min-height:100vh; padding:max(16px,env(safe-area-inset-top)) 16px 48px;
    -webkit-text-size-adjust:100%;
  }
  .wrap{max-width:620px; margin:0 auto}
  h1{font-family:'Lilita One',cursive; font-weight:400; font-size:2rem; line-height:1.05;
     margin:.4em 0 .1em; letter-spacing:.5px}
  .sub{color:var(--ink-soft); font-weight:700; margin:0 0 1.4rem}
  .hidden{display:none !important}

  .card{background:#fff; border:3px solid var(--ink); border-radius:var(--radius);
        box-shadow:var(--pop); padding:1.6rem; text-align:center; margin-top:2rem}
  .card p{color:var(--ink-soft); font-weight:700; margin:.2rem 0 1.3rem}

  .btn{font-family:'Lilita One',cursive; font-weight:400; font-size:1.15rem; letter-spacing:.5px;
       border:3px solid var(--ink); border-radius:999px; padding:.7em 1.4em; cursor:pointer;
       box-shadow:var(--pop); background:var(--yellow); color:var(--ink); display:inline-block;
       text-decoration:none; transition:transform .08s, box-shadow .08s; -webkit-tap-highlight-color:transparent}
  .btn:active{transform:translate(3px,3px); box-shadow:2px 2px 0 var(--ink)}
  .btn-pink{background:var(--pink); color:#fff}
  .btn[disabled]{opacity:.55; cursor:default}

  /* login form */
  .login-form{display:flex; flex-direction:column; gap:14px; text-align:left; margin-top:.5rem}
  .login-form label{font-family:'Lilita One',cursive; font-size:1.05rem; letter-spacing:.3px;
                    display:flex; flex-direction:column; gap:6px}
  .login-form input{font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:700; color:var(--ink);
                    border:2.5px solid var(--ink); border-radius:12px; padding:.65em .7em; background:var(--paper)}
  .login-form input:focus{outline:none; border-color:var(--pink); box-shadow:0 0 0 3px var(--pink-soft)}
  #login-code{letter-spacing:8px; text-align:center; font-size:1.4rem}

  /* editor fields */
  .field{background:#fff; border:3px solid var(--ink); border-radius:var(--radius);
         box-shadow:var(--pop); padding:1rem 1.1rem 1.15rem; margin-bottom:1.1rem}
  .field label{display:block; font-family:'Lilita One',cursive; font-size:1.15rem; letter-spacing:.4px; margin-bottom:.15rem}
  .field .help{color:var(--ink-soft); font-weight:700; font-size:.92rem; margin:0 0 .7rem}
  .field input, .field textarea{width:100%; font-family:'Nunito',sans-serif; font-size:1.1rem; font-weight:700;
    color:var(--ink); border:2.5px solid var(--ink); border-radius:12px; padding:.65em .7em; background:var(--paper); resize:vertical}
  .field input:focus, .field textarea:focus{outline:none; border-color:var(--pink); box-shadow:0 0 0 3px var(--pink-soft)}
  .field textarea{min-height:5.5em; line-height:1.4}

  .bar{position:sticky; bottom:0; margin:1.4rem -16px -48px; padding:14px 16px calc(14px + env(safe-area-inset-bottom));
       background:rgba(255,248,231,0.92); backdrop-filter:blur(6px); border-top:3px solid var(--ink);
       display:flex; align-items:center; gap:12px}
  .bar .btn{flex:1; text-align:center}
  .signout{font-weight:800; color:var(--ink-soft); background:none; border:none; cursor:pointer;
           text-decoration:underline; font-size:.95rem}

  .status{margin:0 0 1rem; padding:.8rem 1rem; border-radius:14px; font-weight:800; border:3px solid var(--ink); box-shadow:var(--pop)}
  .status.ok{background:var(--mint)}
  .status.err{background:var(--pink-soft)}
  .loading{text-align:center; color:var(--ink-soft); font-weight:800; padding:3rem 0; font-size:1.1rem}
</style>
</head>
<body>
<div class="wrap">

  <!-- LOGIN -->
  <section id="view-login" class="hidden">
    <h1>Emmy's website editor ✨</h1>
    <div class="card">
      <p>Log in with your slime-game name &amp; code to edit the website.</p>
      <form id="login-form" class="login-form" autocomplete="off">
        <label>your name
          <input id="login-username" type="text" maxlength="20" autocapitalize="off"
                 autocorrect="off" spellcheck="false" placeholder="your name" />
        </label>
        <label>secret 4-number code
          <input id="login-code" type="text" inputmode="numeric" pattern="\d*" maxlength="4" placeholder="••••" />
        </label>
        <p id="login-error" class="status err hidden"></p>
        <button type="submit" class="btn btn-pink" id="login-btn">Log in →</button>
      </form>
    </div>
  </section>

  <!-- LOADING -->
  <section id="view-loading">
    <div class="loading">Loading… ⏳</div>
  </section>

  <!-- NOT ALLOWED -->
  <section id="view-denied" class="hidden">
    <h1>Hi! 👋</h1>
    <div class="card">
      <p>This editor is just for the website owner. You're logged in, but you can't edit the site.</p>
      <button type="button" class="btn" id="denied-signout">Sign out</button>
    </div>
  </section>

  <!-- EDITOR -->
  <section id="view-editor" class="hidden">
    <h1>Edit my website ✨</h1>
    <p class="sub">Change the words, then tap <b>Save</b>.</p>
    <div id="status" class="status hidden"></div>
    <form id="form" autocomplete="off"></form>
    <div class="bar">
      <button type="button" class="signout" id="signout">sign out</button>
      <button type="button" class="btn btn-pink" id="save">Save my changes 💾</button>
    </div>
  </section>

</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://xikissitwexetetaurnm.supabase.co';
const SUPABASE_ANON_KEY =
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhpa2lzc2l0d2V4ZXRldGF1cm5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExMjE3MDksImV4cCI6MjA4NjY5NzcwOX0.RaoUV5pYIYZjQRHiFIOQd_8jaM3oAgzqtJkNgRlFczY';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Same login scheme as the slime game (keep in sync — see app.js / slime-maker).
const EMAIL_DOMAIN = '@slimemaker.game';
const normalizeUsername = (raw) =>
  raw.trim().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, '');
const buildKidPassword = (code) => `slime-kid-${code}-play`;

const $ = (id) => document.getElementById(id);

const FIELDS = [
  { path:'home.kicker',     label:'Welcome line',    help:'The tiny line at the very top of the home screen.', multiline:false },
  { path:'home.subtitle',   label:'Hello paragraph', help:'The friendly hello under your name.',               multiline:true  },
  { path:'home.ctaPrimary', label:'Big button',      help:'The main button on the home screen.',               multiline:false },
  { path:'home.ctaGhost',   label:'Other button',    help:'The second button on the home screen.',             multiline:false },
  { path:'about.heading',   label:'About Me title',  help:'The heading of your About Me section.',             multiline:false },
  { path:'footer.year',     label:'Bottom line',     help:'The little line at the very bottom of the page.',    multiline:false },
];

let content = null;

function show(view){
  ['login','loading','denied','editor'].forEach((v) =>
    $('view-' + v).classList.toggle('hidden', v !== view)
  );
}
function status(msg, ok){
  const el = $('status'); el.textContent = msg; el.className = 'status ' + (ok ? 'ok' : 'err');
}
function clearStatus(){ $('status').className = 'status hidden'; }

function getPath(obj, path){ return path.split('.').reduce((o,k)=> o==null?o:o[k], obj); }
function setPath(obj, path, val){
  const ks = path.split('.'); let o = obj;
  for(let i=0;i<ks.length-1;i++){ if(o[ks[i]]==null) o[ks[i]]={}; o=o[ks[i]]; }
  o[ks[ks.length-1]] = val;
}
const fieldId = (f) => 'f_' + f.path.replace(/\./g,'_');

function buildForm(){
  $('form').innerHTML = FIELDS.map((f) => {
    const id = fieldId(f);
    const input = f.multiline ? `<textarea id="${id}"></textarea>` : `<input id="${id}" type="text" />`;
    return `<div class="field"><label for="${id}">${f.label}</label><p class="help">${f.help}</p>${input}</div>`;
  }).join('');
}
function fillForm(){
  FIELDS.forEach((f) => { const v = getPath(content, f.path); $(fieldId(f)).value = (v==null ? '' : String(v)); });
}
function readForm(){ FIELDS.forEach((f) => setPath(content, f.path, $(fieldId(f)).value)); }

async function logIn(rawName, code){
  const username = normalizeUsername(rawName);
  if (username.length < 2) throw new Error('Name must be at least 2 letters.');
  if (!/^\d{4}$/.test(code)) throw new Error('Code must be exactly 4 numbers.');
  const email = username + EMAIL_DOMAIN;
  const password = buildKidPassword(code);
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) throw new Error('Wrong name or code.');
}

async function loadEditor(){
  show('loading');
  const { data: sess } = await sb.auth.getSession();
  if (!sess.session){ show('login'); return; }

  const { data: prof } = await sb.from('profiles')
    .select('is_admin').eq('id', sess.session.user.id).maybeSingle();
  if (!prof || !prof.is_admin){ show('denied'); return; }

  const { data: row, error } = await sb.from('site_content').select('data').eq('id','main').maybeSingle();
  if (error){ show('editor'); buildForm(); status('Could not load the text ('+error.message+').', false); return; }
  content = (row && row.data) ? row.data : {};
  buildForm(); fillForm(); clearStatus(); show('editor');
}

async function save(){
  const btn = $('save');
  readForm();
  btn.disabled = true; const orig = btn.textContent; btn.textContent = 'Saving…'; clearStatus();
  try {
    const { error } = await sb.from('site_content')
      .update({ data: content, updated_at: new Date().toISOString() })
      .eq('id','main');
    if (error) throw error;
    status('Saved! 🎉 Your website updates right away — refresh it to see.', true);
  } catch (err) {
    status("Hmm, saving didn't work (" + (err.message||err) + ').', false);
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
}

async function signOut(){ await sb.auth.signOut(); show('login'); }

// wire up
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = $('login-error'); err.className = 'status err hidden';
  const btn = $('login-btn'); btn.disabled = true; const orig = btn.textContent; btn.textContent = 'one sec…';
  try {
    await logIn($('login-username').value, $('login-code').value);
    await loadEditor();
  } catch (e2) {
    err.textContent = e2.message || 'Login failed.'; err.className = 'status err';
  } finally {
    btn.disabled = false; btn.textContent = orig;
  }
});
$('save').addEventListener('click', save);
$('signout').addEventListener('click', signOut);
$('denied-signout').addEventListener('click', signOut);

loadEditor();
</script>
</body>
</html>
